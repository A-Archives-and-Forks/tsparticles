name: Deploy Website

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - 'websites/website/**'
  workflow_dispatch:

concurrency:
  group: deploy-website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: websites/website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: websites/website
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: websites/website
        run: pnpm run lint

      - name: Build
        working-directory: websites/website
        run: pnpm run docs:build

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAGES_APP_ID }}
          private-key: ${{ secrets.PAGES_APP_PRIVATE_KEY }}
          owner: tsparticles
          repositories: |
            website

      - name: Deploy to tsparticles/website main
        uses: peaceiris/actions-gh-pages@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          external_repository: tsparticles/website
          publish_branch: main
          publish_dir: websites/website/docs/.vitepress/dist
          cname: particles.js.org
          user_name: 'github-actions-bot'
          user_email: 'support+actions@github.com'
          commit_message: 'build: website updated'
          force_orphan: true
