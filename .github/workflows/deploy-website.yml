name: Deploy Website

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - 'websites/website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

concurrency:
  group: deploy-website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: "${{ secrets.NX_CLOUD_ACCESS_TOKEN }}"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for website changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q "^websites/website/"; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Initialize Nx Cloud or fall back to local
        run: |
          if [ -z "$NX_CLOUD_ACCESS_TOKEN" ]; then
            echo "NX Cloud token missing — using local nx execution"
            echo "NX_NO_CLOUD=true" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm exec nx run-many -t build

      - name: Build website
        working-directory: websites/website
        run: pnpm run docs:build

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAGES_APP_ID }}
          private-key: ${{ secrets.PAGES_APP_PRIVATE_KEY }}
          owner: tsparticles
          repositories: |
            website

      - name: Deploy to tsparticles/website main
        uses: peaceiris/actions-gh-pages@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          external_repository: tsparticles/website
          publish_branch: main
          publish_dir: websites/website/docs/.vitepress/dist
          cname: particles.js.org
          user_name: 'github-actions-bot'
          user_email: 'support+actions@github.com'
          commit_message: 'build: website updated'
          force_orphan: true
