name: Deploy Confetti

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - 'websites/confetti/**'
  workflow_dispatch:

concurrency:
  group: deploy-confetti-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: websites/confetti/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: websites/confetti
        run: pnpm install

      - name: Build
        working-directory: websites/confetti
        run: pnpm run build:ci

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAGES_APP_ID }}
          private-key: ${{ secrets.PAGES_APP_PRIVATE_KEY }}
          owner: tsparticles
          repositories: |
            confetti

      - name: Deploy to tsparticles/confetti gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          external_repository: tsparticles/confetti
          publish_branch: gh-pages
          publish_dir: websites/confetti/public
          cname: confetti.js.org
          user_name: 'github-actions-bot'
          user_email: 'support+actions@github.com'
          commit_message: 'build: gh pages updated'
          force_orphan: true